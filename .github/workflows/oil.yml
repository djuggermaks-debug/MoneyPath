name: "🛢️ Нефть Brent"

on:
  schedule:
    - cron: "0,30 7-8 * * 1-5"
    - cron: "0 9-13 * * 1-5"
    - cron: "0,30 13-15 * * 1-5"
    - cron: "0 15-21 * * 1-5"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python main.py
        env:
          INSTRUMENT: OIL
          MODE: trading
          EVENT_NAME: ${{ github.event_name }}
          TV_SESSION: ${{ secrets.TV_SESSION }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      - run: |
          git config user.name "MoneyPath Bot"
          git config user.email "bot@moneypath"
          git add docs/data/
          git diff --staged --quiet || git commit -m "oil: update $(date -u +%Y-%m-%dT%H:%M)"
          git pull --no-rebase origin main
          git push
