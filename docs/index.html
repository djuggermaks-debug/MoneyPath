<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyPath</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 24px;
    }

    h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #555;
      margin-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 32px;
    }

    .btn {
      display: block;
      background: #1e2130;
      border: 2px solid #2a2d3e;
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
      text-decoration: none;
      color: #e0e0e0;
      transition: all 0.15s;
    }

    .btn:hover { border-color: #4a90d9; background: #252840; }
    .btn.active { border-color: #4a90d9; background: #1a2744; color: #fff; }

    .btn .icon { font-size: 28px; margin-bottom: 8px; }
    .btn .label { font-size: 13px; font-weight: 600; }
    .btn .sub { font-size: 11px; color: #666; margin-top: 4px; }
    .btn.active .sub { color: #4a90d9; }

    .alert-card {
      background: #1e2130;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      border-left: 4px solid #2a2d3e;
    }

    .alert-card.bullish { border-color: #4CAF50; }
    .alert-card.bearish { border-color: #f44336; }
    .alert-card.neutral  { border-color: #FF9800; }

    .alert-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .alert-signal { font-weight: 700; font-size: 15px; }
    .alert-signal.bullish { color: #4CAF50; }
    .alert-signal.bearish { color: #f44336; }
    .alert-signal.neutral  { color: #FF9800; }
    .alert-meta { font-size: 12px; color: #555; }

    .alert-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
    .alert-stat { font-size: 12px; }
    .alert-stat .s-label { color: #555; }
    .alert-stat .s-val { font-weight: 600; }

    .alert-action { font-size: 13px; color: #4a90d9; margin: 6px 0; }
    .alert-risk { font-size: 13px; color: #FF9800; margin-bottom: 4px; }
    .alert-text { font-size: 13px; color: #777; margin-bottom: 4px; }

    .alert-news { margin-top: 10px; border-top: 1px solid #2a2d3e; padding-top: 8px; }
    .alert-news a { display: block; font-size: 12px; color: #4a90d9; text-decoration: none; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .alert-news a:hover { text-decoration: underline; }

    .alert-pattern { font-size: 13px; color: #9c88ff; margin: 6px 0; }
    .alert-edu { font-size: 13px; color: #aaa; margin-top: 10px; padding: 10px; background: #161a26; border-radius: 8px; border-left: 3px solid #4a90d9; }
    .edu-label { color: #4a90d9; font-weight: 600; }

    .strength-dots { display: inline-flex; gap: 3px; margin-left: 6px; vertical-align: middle; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #2a2d3e; display: inline-block; }
    .dot.filled { background: currentColor; }

    .empty { color: #555; font-size: 14px; padding: 16px 0; }

    .timer-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #555;
      margin-bottom: 14px;
    }
    .timer-bar .timer-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #2a2d3e;
      flex-shrink: 0;
    }
    .timer-bar .timer-dot.active { background: #4CAF50; animation: pulse 1.5s infinite; }
    .timer-bar .timer-dot.closed { background: #555; }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    .timer-bar .timer-text { color: #888; }
    .timer-bar .timer-count { color: #e0e0e0; font-weight: 600; font-variant-numeric: tabular-nums; }

    .digest-card {
      background: #1e2130;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
      border-left: 4px solid #9c88ff;
    }
    .digest-title { font-size: 16px; font-weight: 700; color: #9c88ff; margin-bottom: 12px; }
    .digest-time { font-size: 12px; color: #555; margin-bottom: 16px; }
    .digest-events { margin-bottom: 12px; }
    .digest-events li { font-size: 13px; color: #ccc; margin-bottom: 5px; padding-left: 4px; }
    .digest-section { margin-bottom: 10px; }
    .digest-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 4px; }
    .digest-text { font-size: 13px; color: #e0e0e0; line-height: 1.6; }
    .digest-action { font-size: 13px; color: #4a90d9; }
    .digest-risk { font-size: 13px; color: #FF9800; }
    .upcoming { margin-top: 14px; border-top: 1px solid #2a2d3e; padding-top: 12px; }
    .upcoming-item { display: flex; gap: 12px; margin-bottom: 10px; align-items: flex-start; }
    .upcoming-date { font-size: 12px; color: #4a90d9; font-weight: 600; min-width: 90px; padding-top: 2px; }
    .upcoming-body { flex: 1; }
    .upcoming-event { font-size: 13px; color: #e0e0e0; font-weight: 600; }
    .upcoming-meta { font-size: 12px; color: #555; margin-top: 2px; }
  </style>
</head>
<body>

  <h1>💹 MoneyPath</h1>
  <p class="subtitle">Аналитика рынков</p>

  <div class="section-title">Инструмент</div>
  <div class="grid">
    <a class="btn" href="?i=OIL"   id="btn-OIL">
      <div class="icon">🛢️</div>
      <div class="label">Нефть</div>
      <div class="sub">Brent</div>
    </a>
    <a class="btn" href="?i=GAS"   id="btn-GAS">
      <div class="icon">🔥</div>
      <div class="label">Газ</div>
      <div class="sub">Natural Gas</div>
    </a>
    <a class="btn" href="?i=GOLD"  id="btn-GOLD">
      <div class="icon">🥇</div>
      <div class="label">Золото</div>
      <div class="sub">Gold</div>
    </a>
    <a class="btn" href="?i=BTC"   id="btn-BTC">
      <div class="icon">₿</div>
      <div class="label">Bitcoin</div>
      <div class="sub">BTC/USD</div>
    </a>
    <a class="btn" href="?i=ALL"   id="btn-ALL">
      <div class="icon">🌐</div>
      <div class="label">Все</div>
      <div class="sub">Все алерты</div>
    </a>
    <a class="btn" href="?i=DIGEST" id="btn-DIGEST">
      <div class="icon">📰</div>
      <div class="label">Дайджест</div>
      <div class="sub">Мир / Политика</div>
    </a>
  </div>

  <div class="section-title">Алерты</div>
  <div id="oil-timer" class="timer-bar" style="display:none">
    <span class="timer-dot" id="timer-dot"></span>
    <span class="timer-text" id="timer-text"></span>
    <span class="timer-count" id="timer-count"></span>
  </div>
  <div id="alerts-container">
    <div class="empty">Загрузка...</div>
  </div>

  <script>
    const REPO = "djuggermaks-debug/MoneyPath";
    const ALERTS_URL  = `https://raw.githubusercontent.com/${REPO}/main/data/alerts.json`;
    const DIGEST_URL  = `https://raw.githubusercontent.com/${REPO}/main/data/digest.json`;

    const SIGNAL_EMOJI = { "бычий": "📈", "медвежий": "📉", "нейтральный": "➡️" };
    const SIGNAL_EN   = { "бычий": "bullish", "медвежий": "bearish", "нейтральный": "neutral" };

    const params = new URLSearchParams(location.search);
    const active = params.get("i") || "ALL";

    const btn = document.getElementById("btn-" + active);
    if (btn) btn.classList.add("active");

    const sectionTitle = document.querySelector(".section-title:last-of-type");
    if (active === "DIGEST" && sectionTitle) sectionTitle.textContent = "Дайджест";

    async function loadAlerts() {
      const container = document.getElementById("alerts-container");

      if (active === "DIGEST") {
        try {
          const resp = await fetch(DIGEST_URL + "?t=" + Date.now());
          if (!resp.ok) throw new Error();
          const d = await resp.json();
          container.innerHTML = renderDigest(d);
        } catch {
          container.innerHTML = '<div class="empty">Дайджест ещё не запускался. Нажмите кнопку в GitHub Actions.</div>';
        }
        return;
      }

      try {
        const resp = await fetch(ALERTS_URL + "?t=" + Date.now());
        if (!resp.ok) throw new Error();
        const all = await resp.json();
        const alerts = active === "ALL" ? all : all.filter(a => a.instrument === active);

        if (!alerts.length) {
          container.innerHTML = '<div class="empty">Алертов пока нет.</div>';
          return;
        }
        container.innerHTML = alerts.map(renderAlert).join("");
      } catch {
        container.innerHTML = '<div class="empty">Данных нет — система ещё не запускалась.</div>';
      }
    }

    function renderDigest(d) {
      const time = new Date(d.timestamp).toLocaleString("ru");

      const events = (d.top_events || []).length
        ? `<div class="digest-section">
             <div class="digest-label">Главные события</div>
             <ul class="digest-events">${d.top_events.map(e => `<li>• ${e}</li>`).join("")}</ul>
           </div>`
        : "";

      const upcoming = (d.upcoming_events || []).length
        ? `<div class="upcoming">
             <div class="digest-label">Предстоящие события</div>
             ${d.upcoming_events.map(e => `
               <div class="upcoming-item">
                 <div class="upcoming-date">📅 ${e.date}</div>
                 <div class="upcoming-body">
                   <div class="upcoming-event">${e.event}</div>
                   <div class="upcoming-meta">📍 ${e.location}${e.participants && e.participants.length ? " · " + e.participants.join(", ") : ""}</div>
                 </div>
               </div>`).join("")}
           </div>`
        : "";

      return `
        <div class="digest-card">
          <div class="digest-title">📰 Мировой дайджест</div>
          <div class="digest-time">${time}</div>
          ${events}
          <div class="digest-section">
            <div class="digest-label">Обзор</div>
            <div class="digest-text">${d.reasoning || ""}</div>
          </div>
          <div class="digest-section">
            <div class="digest-label">На что смотреть</div>
            <div class="digest-action">→ ${d.action || ""}</div>
          </div>
          <div class="digest-section">
            <div class="digest-label">Главный риск</div>
            <div class="digest-risk">⚠ ${d.risk || ""}</div>
          </div>
          ${upcoming}
        </div>`;
    }

    function renderAlert(a) {
      const cls   = SIGNAL_EN[a.signal] || "neutral";
      const emoji = SIGNAL_EMOJI[a.signal] || "➡️";
      const time  = new Date(a.timestamp).toLocaleString("ru");
      const s     = a.strength || 0;

      const dots = Array.from({length: 5}, (_, i) =>
        `<span class="dot ${i < s ? "filled" : ""}"></span>`
      ).join("");

      const stats = [
        a.price      ? `<div class="alert-stat"><span class="s-label">Цена </span><span class="s-val">${a.price}</span></div>` : "",
        a.change_pct != null ? `<div class="alert-stat"><span class="s-label">День </span><span class="s-val">${a.change_pct > 0 ? "+" : ""}${a.change_pct}%</span></div>` : "",
        a.rsi        ? `<div class="alert-stat"><span class="s-label">RSI </span><span class="s-val">${a.rsi}</span></div>` : "",
        a.support    ? `<div class="alert-stat"><span class="s-label">Поддержка </span><span class="s-val">${a.support}</span></div>` : "",
        a.resistance ? `<div class="alert-stat"><span class="s-label">Сопротивление </span><span class="s-val">${a.resistance}</span></div>` : "",
      ].filter(Boolean).join("");

      const news = "";

      const position = a.position
        ? `<div class="alert-text">⚠️ Позиция: ${a.position.direction} с ${a.position.level} | P&L: ${a.position.upl}</div>`
        : "";

      const dotColor = cls === "bullish" ? "#4CAF50" : cls === "bearish" ? "#f44336" : "#FF9800";

      return `
        <div class="alert-card ${cls}">
          <div class="alert-header">
            <span class="alert-signal ${cls}">${emoji} ${a.instrument_name} — ${a.signal}
              <span class="strength-dots" style="color:${dotColor}">${dots}</span>
            </span>
            <span class="alert-meta">${time}</span>
          </div>
          <div class="alert-row">${stats}</div>
          ${position}
          <div class="alert-text">${a.key_factor || ""}</div>
          <div class="alert-action">→ ${a.action || ""}</div>
          <div class="alert-risk">⚠ ${a.risk || ""}</div>
          <div class="alert-text">${a.reasoning || ""}</div>
          ${a.pattern ? `<div class="alert-pattern">📐 ${a.pattern}</div>` : ""}
          ${a.education ? `<div class="alert-edu"><span class="edu-label">📚 Обучение:</span> ${a.education}</div>` : ""}
          ${news}
        </div>`;
    }

    // Счётчик для нефти (OIL): каждые 30 мин, 07:00–20:00 UTC, пн–пт
    function getNextOilUpdate() {
      const now = new Date();
      const day  = now.getUTCDay();   // 0=вс, 6=сб
      const h    = now.getUTCHours();
      const m    = now.getUTCMinutes();
      const s    = now.getUTCSeconds();

      const isWeekend = day === 0 || day === 6;
      const inHours   = h >= 7 && h < 20;

      if (isWeekend || !inHours) {
        return { active: false };
      }

      // следующая :00 или :30
      const nextM   = m < 30 ? 30 : 60;
      const secsLeft = (nextM - m) * 60 - s;
      return { active: true, secs: secsLeft };
    }

    function fmt(secs) {
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function tickTimer() {
      const timerEl = document.getElementById("oil-timer");
      if (!timerEl) return;

      if (active !== "OIL" && active !== "ALL") {
        timerEl.style.display = "none";
        return;
      }

      timerEl.style.display = "flex";
      const dot   = document.getElementById("timer-dot");
      const text  = document.getElementById("timer-text");
      const count = document.getElementById("timer-count");
      const info  = getNextOilUpdate();

      if (info.active) {
        dot.className   = "timer-dot active";
        text.textContent = "🛢️ Нефть — обновление через";
        count.textContent = fmt(info.secs);
      } else {
        dot.className   = "timer-dot closed";
        text.textContent = "🛢️ Нефть — торги закрыты";
        count.textContent = "(07:00–20:00 UTC пн–пт)";
      }
    }

    tickTimer();
    setInterval(tickTimer, 1000);

    loadAlerts();
  </script>
</body>
</html>
